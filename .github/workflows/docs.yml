name: Build and Deploy Documentation

on:
  push:
    branches:
      - main # Deploy docs when changes are pushed to the main branch
  workflow_dispatch: # Allows manual triggering of the workflow from GitHub UI

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_deploy_docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To push to the gh-pages branch
      pages: write # To enable GitHub Pages deployment
      id-token: write # For OIDC authentication for GitHub Pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features

      - name: Deploy documentation to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc # The directory where cargo doc outputs the HTML files
          publish_branch: gh-pages # The branch where the docs will be pushed
          # cname: your-domain.com # Uncomment and replace if you use a custom domain
