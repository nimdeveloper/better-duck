name: Publish Rust Crate to crates.io

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # Stable releases (e.g., v1.0.0)
      - "v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+" # Beta releases (e.g., v1.0.0-beta.1)

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create .crate artifact and calculate its digest for SLSA
  create_crate_artifact:
    runs-on: ubuntu-latest
    outputs:
      crate_digest: ${{ steps.calculate_digest.outputs.digest }}
      crate_name: ${{ steps.get_crate_info.outputs.crate_name }}
      crate_version: ${{ steps.get_crate_info.outputs.crate_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get crate name and version
        id: get_crate_info
        run: |
          CRATES=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].name')
          # Use the first workspace member as the primary crate name for SLSA
          CRATE_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "crate_name=$CRATE_NAME" >> $GITHUB_OUTPUT
          echo "crate_version=$CRATE_VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Package crate (dry run for digest)
        run: cargo package --no-verify
        working-directory: .

      - name: Calculate crate digest
        id: calculate_digest
        run: |
          CRATE_FILE=$(find target/package -name "*.crate" | head -n 1)
          if [ -z "$CRATE_FILE" ]; then
            echo "Error: .crate file not found in target/package/."
            exit 1
          fi
          DIGEST=$(sha256sum "$CRATE_FILE" | awk '{print $1}')
          echo "digest=sha256:$DIGEST" >> $GITHUB_OUTPUT
          echo "Crate file: $CRATE_FILE"
          echo "Digest: sha256:$DIGEST"
        shell: bash

  # Publish
  publish:
    runs-on: ubuntu-latest
    needs: create_crate_artifact
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Login to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Confirm clean working tree
        run: git diff --exit-code

      - name: Get workspace crate names
        id: get_crates
        run: |
          CRATES=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].name')
          echo "crates=$CRATES" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish crates to crates.io
        env:
          CRATES_TO_PUBLISH: ${{ steps.get_crates.outputs.crates }}
        run: |
          for CRATE in $CRATES_TO_PUBLISH; do
            echo "Publishing $CRATE..."
            cargo publish -p "$CRATE" --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --no-verify
            echo "$CRATE published."
            sleep 5
          done
        shell: bash

  # SLSA provenance
  generate_slsa_provenance:
    needs: [create_crate_artifact, publish]
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.9.0
    with:
      base64-subjects: "${{ needs.create_crate_artifact.outputs.crate_digest }}  ${{ needs.create_crate_artifact.outputs.crate_name }}-${{ needs.create_crate_artifact.outputs.crate_version }}.crate"
      upload-assets: true
    permissions:
      contents: write
      id-token: write
