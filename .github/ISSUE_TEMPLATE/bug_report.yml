name: Bug report
description: Something is not working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. The more detail you provide, the faster we can investigate.

  - type: dropdown
    id: crate
    attributes:
      label: Which crate?
      options:
        - better-duck-core
        - better-duck-diesel
        - Both / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `cargo pkgid better-duck-core` or the version in your Cargo.toml
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: rust_version
    attributes:
      label: Rust version
      description: Output of `rustc --version`
      placeholder: "rustc 1.82.0 (stable)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux x86_64
        - macOS (Apple Silicon)
        - macOS (x86_64)
        - Windows x86_64
        - iOS (cross-build)
        - Other
    validations:
      required: true

  - type: checkboxes
    id: features
    attributes:
      label: Active features
      options:
        - label: bundled (default)
        - label: chrono
        - label: decimal
        - label: json
        - label: parquet
        - label: r2d2

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest Rust snippet or test that shows the problem.
      render: rust
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant compiler errors, panics, or runtime output.
      render: text
